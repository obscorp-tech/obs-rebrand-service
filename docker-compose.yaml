services:
  rebrand-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rebrand-api
    restart: unless-stopped
    ports:
      - "${REBRAND_PORT:-8000}:8000"
    volumes:
      # Persist configs and templates — survive container rebuilds
      - ./configs:/app/configs:ro
      - ./templates:/app/templates:ro
      # Output volume for batch results
      - rebrand-output:/app/output
    environment:
      - REBRAND_CONFIG_DIR=/app/configs/clients
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  rebrand-output:
    name: rebrand-output
