name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Create venv and install
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e ".[dev]"
      - name: Lint
        run: |
          source .venv/bin/activate
          ruff check src/ tests/
      - name: Format check
        run: |
          source .venv/bin/activate
          ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Create venv and install
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e ".[dev]"
      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v --tb=short

  validate-configs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Create venv and install
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e .
      - name: Validate all client configs
        run: |
          source .venv/bin/activate
          rebrand validate --configs-dir configs/clients
