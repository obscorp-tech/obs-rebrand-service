name: Rebrand on Config Change

on:
  push:
    branches: [main]
    paths:
      - "configs/clients/*.yaml"
      - "templates/**"

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changed_clients: ${{ steps.detect.outputs.clients }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: detect
        name: Detect changed client configs
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'configs/clients/*.yaml' | \
            sed 's|configs/clients/||;s|\.yaml||' | \
            grep -v '^_' | \
            jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "clients=${CHANGED}" >> "$GITHUB_OUTPUT"
          echo "Changed clients: ${CHANGED}"

  rebrand:
    needs: detect-changes
    if: needs.detect-changes.outputs.changed_clients != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        client: ${{ fromJson(needs.detect-changes.outputs.changed_clients) }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e .
      - name: Validate config
        run: rebrand validate --configs-dir configs/clients
      - name: Run batch rebrand
        run: |
          # Process any queued input files for this client
          INPUT_DIR="queue/${{ matrix.client }}"
          OUTPUT_DIR="output/${{ matrix.client }}"
          if [ -d "${INPUT_DIR}" ]; then
            rebrand batch \
              --client "${{ matrix.client }}" \
              --input-dir "${INPUT_DIR}" \
              --output-dir "${OUTPUT_DIR}" \
              --recursive \
              --verbose
          else
            echo "No queued files for ${{ matrix.client }}"
          fi
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rebranded-${{ matrix.client }}
          path: output/${{ matrix.client }}/
          retention-days: 30
      - name: Upload audit logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-${{ matrix.client }}
          path: output/${{ matrix.client }}/audit_*.json
          retention-days: 90
